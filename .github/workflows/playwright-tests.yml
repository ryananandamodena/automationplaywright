name: 🎭 Playwright Tests with Allure Reports

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM WIB (7 PM UTC previous day)
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - contracts
          - sales-orders
          - purchase-orders

env:
  PLAYWRIGHT_VERSION: '1.58.2'
  NODE_VERSION: '22'

jobs:
  test:
    name: 🧪 Run Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chromium]
        # Uncomment for multi-browser testing:
        # project: [chromium, firefox, webkit]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Ryan/test-playwright/package-lock.json

      - name: 📦 Install dependencies
        working-directory: Ryan/test-playwright
        run: npm ci

      - name: 🎭 Install Playwright browsers
        working-directory: Ryan/test-playwright
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: 🧪 Run Playwright tests
        working-directory: Ryan/test-playwright
        run: |
          if [ "${{ github.event.inputs.test_suite }}" == "smoke" ]; then
            npx playwright test --grep @smoke --project=${{ matrix.project }}
          elif [ "${{ github.event.inputs.test_suite }}" == "contracts" ]; then
            npx playwright test contract --project=${{ matrix.project }}
          elif [ "${{ github.event.inputs.test_suite }}" == "sales-orders" ]; then
            npx playwright test more1/so --project=${{ matrix.project }}
          elif [ "${{ github.event.inputs.test_suite }}" == "purchase-orders" ]; then
            npx playwright test more1/po --project=${{ matrix.project }}
          else
            npx playwright test --project=${{ matrix.project }}
          fi
        env:
          CI: true
          BASE_URL_MHC: https://mhc-dev.modena.com
          BASE_URL_FMS: https://portal-dev.modena.com

      - name: 📊 Generate Allure report
        if: always()
        working-directory: Ryan/test-playwright
        run: npx allure generate allure-results -o allure-report --clean

      - name: 📤 Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.project }}
          path: Ryan/test-playwright/allure-results/
          retention-days: 30

      - name: 📤 Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.project }}
          path: Ryan/test-playwright/allure-report/
          retention-days: 30

      - name: 📤 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: Ryan/test-playwright/playwright-report/
          retention-days: 30

      - name: 📸 Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ matrix.project }}
          path: Ryan/test-playwright/test-results/
          retention-days: 7

  publish-report:
    name: 📊 Publish Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: 📥 Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: 📊 Generate combined Allure report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages
          destination_dir: reports

  notify:
    name: 📢 Send Notifications
    runs-on: ubuntu-latest
    needs: [test, publish-report]
    if: always()
    
    steps:
      - name: 📊 Determine status
        id: status
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "status=✅ PASSED" >> $GITHUB_OUTPUT
            echo "color=success" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "color=failure" >> $GITHUB_OUTPUT
          fi

      - name: 📢 Create summary
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Reports" >> $GITHUB_STEP_SUMMARY
          echo "- [View Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Download Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
