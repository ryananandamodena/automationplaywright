name: E2E Tests - FMS Contract & Service

on:
  # Trigger on push to main/master/develop
  push:
    branches: [ main, master, develop ]
  
  # Trigger on pull request
  pull_request:
    branches: [ main, master, develop ]
  
  # Manual trigger
  workflow_dispatch:
  
  # Scheduled run (every day at 2 AM WIB)
  schedule:
    - cron: '0 19 * * *'  # 2 AM WIB = 7 PM UTC

permissions:
  contents: read
  actions: read

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        test: [contract, service, approval]
      fail-fast: false
    
    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      # 3. Install dependencies
      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
      
      # 4. Run Contract Creation Test
      - name: Run Contract Creation Test
        if: matrix.test == 'contract'
        working-directory: test-playwright
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          HEADLESS: true
        run: node create-contract-simple.mjs
        continue-on-error: true
      
      # 5. Run Full E2E Test (Contract + Service)
      - name: Run Full E2E Test
        if: matrix.test == 'service'
        working-directory: test-playwright
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          HEADLESS: true
        run: node contract-service-e2e-flexible.mjs
        continue-on-error: true
      
      # 6. Run Approval Flow Test
      - name: Run Approval Flow Test
        if: matrix.test == 'approval'
        working-directory: test-playwright
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          APPROVER1_EMAIL: ${{ secrets.APPROVER1_EMAIL }}
          APPROVER1_PASSWORD: ${{ secrets.APPROVER1_PASSWORD }}
          APPROVER2_EMAIL: ${{ secrets.APPROVER2_EMAIL }}
          APPROVER2_PASSWORD: ${{ secrets.APPROVER2_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          HEADLESS: true
        run: node contract-approval-e2e.mjs
        continue-on-error: true
      
      # 7. Upload screenshots on failure
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ matrix.test }}
          path: |
            test-playwright/*.png
            test-results/
          retention-days: 7
      
